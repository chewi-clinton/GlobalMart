version: "3.9"

services:
  # ─── Infrastructure ────────────────────────────────────────────────
  postgres:
    image: postgres:17
    container_name: globalmart_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: globalmart
      POSTGRES_PASSWORD: globalmart_secret
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U globalmart"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: globalmart_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: globalmart
      RABBITMQ_DEFAULT_PASS: globalmart_secret
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: globalmart_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Auth Service ──────────────────────────────────────────────────
  auth_service:
    build:
      context: ./services/auth_service
      dockerfile: Dockerfile
    container_name: globalmart_auth_service
    restart: unless-stopped
    env_file:
      - ./services/auth_service/.env
    volumes:
      - ./services/auth_service:/app
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py wait_for_db &&
             python manage.py migrate &&
             python manage.py seed_tiers &&
             python manage.py runserver 0.0.0.0:8001"

  # ─── Future services (uncomment as each is built) ──────────────────
  # product_service: ...
  # currency_service: ...
  # inventory_service: ...
  # order_service: ...
  # payment_service: ...
  # notification_service: ...
  # reporting_service: ...

volumes:
  postgres_data:
