services:
  # ─── Infrastructure ────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: globalmart_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: globalmart_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Auth Service ──────────────────────────────────────────────────
  auth_service:
    build:
      context: ./services/Auth_service
      dockerfile: Dockerfile
    container_name: globalmart_auth_service
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "False"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      DATABASE_URL: ${DATABASE_URL}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
      JWT_ACCESS_TOKEN_LIFETIME_MINUTES: ${JWT_ACCESS_TOKEN_LIFETIME_MINUTES}
      JWT_REFRESH_TOKEN_LIFETIME_DAYS: ${JWT_REFRESH_TOKEN_LIFETIME_DAYS}
      FRONTEND_URL: ${FRONTEND_URL}
    ports:
      - "8001:8001"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_tiers &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8001 --workers 3 --timeout 120"

  # ─── Future services (uncomment as each is built) ──────────────────
  # product_service: ...
  # currency_service: ...
  # inventory_service: ...
  # order_service: ...
  # payment_service: ...
  # notification_service: ...
  # reporting_service: ...
