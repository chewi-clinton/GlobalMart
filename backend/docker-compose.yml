version: "3.9"

services:
  # ─── Infrastructure ────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: globalmart_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: globalmart
      RABBITMQ_DEFAULT_PASS: globalmart_secret
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: globalmart_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Auth Service ──────────────────────────────────────────────────
  auth_service:
    build:
      context: ./services/Auth_service
      dockerfile: Dockerfile
    container_name: globalmart_auth_service
    restart: unless-stopped
    env_file:
      - ./services/Auth_service/.env
    ports:
      - "8001:8001"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_tiers &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8001 --workers 3 --timeout 120"

  # ─── Product Service ───────────────────────────────────────────────
  product_service:
    build:
      context: ./services/product_service
      dockerfile: Dockerfile
    container_name: globalmart_product_service
    restart: unless-stopped
    env_file:
      - ./services/product_service/.env
    volumes:
      - ./services/product_service:/app
      - product_media:/app/media
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py wait_for_db &&
             python manage.py migrate &&
             python manage.py seed_categories &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8002 --workers 3 --timeout 120"

  # ─── Product Nginx ─────────────────────────────────────────────────
  product_nginx:
    image: nginx:1.25-alpine
    container_name: globalmart_product_nginx
    restart: unless-stopped
    ports:
      - "8002:80"
    volumes:
      - ./services/product_service/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - product_media:/app/media:ro
    depends_on:
      - product_service

  # ─── Currency Service ──────────────────────────────────────────────
  currency_service:
    build:
      context: ./services/currency_service
      dockerfile: Dockerfile
    container_name: globalmart_currency_service
    restart: unless-stopped
    env_file:
      - ./services/currency_service/.env
    volumes:
      - ./services/currency_service:/app
    ports:
      - "8003:8003"
    depends_on:
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8003 --workers 3 --timeout 120"

  # ─── Inventory Service ─────────────────────────────────────────────
  inventory_service:
    build:
      context: ./services/inventory_service
      dockerfile: Dockerfile
    container_name: globalmart_inventory_service
    restart: unless-stopped
    env_file:
      - ./services/inventory_service/.env
    volumes:
      - ./services/inventory_service:/app
    ports:
      - "8004:8004"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_warehouses &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8004 --workers 3 --timeout 120"
  order_service:
    build:
      context: ./services/order_service
      dockerfile: Dockerfile
    container_name: globalmart_order_service
    restart: unless-stopped
    env_file:
      - ./services/order_service/.env
    volumes:
      - ./services/order_service:/app
    ports:
      - "8005:8005"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8005 --workers 3 --timeout 120"

  # ─── Future services ───────────────────────────────────────────────
  # payment_service: ...
  # notification_service: ...
  # reporting_service: ...

volumes:
  product_media:
